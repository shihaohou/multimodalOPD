main_process_port: 13378

compute_environment: LOCAL_MACHINE
debug: false
deepspeed_config:
  deepspeed_multinode_launcher: standard
  zero_stage: 2
  overlap_comm: true
  contiguous_gradients: true
  gradient_clip: 1
  # Smoke-test variant of accelerate_zero2_gpu_8.yaml with gradient_accumulation_steps=1
  # so a quick run (MAX_STEPS=5) takes one forward per step instead of 8. Same rule as
  # the main config: this INTEGER must EQUAL the launcher's GRADIENT_ACCUMULATION_STEPS
  # (accelerate int()s it at init — `auto` raises ValueError). Use with
  # GRADIENT_ACCUMULATION_STEPS=1. For real runs use accelerate_zero2_gpu_8.yaml (ga=8).
  gradient_accumulation_steps: 1
distributed_type: DEEPSPEED
downcast_bf16: 'auto'
machine_rank: 0
main_training_function: main
mixed_precision: bf16
num_machines: 1
num_processes: 8
rdzv_backend: static
same_network: true
tpu_env: []
tpu_use_cluster: false
tpu_use_sudo: false
use_cpu: false
