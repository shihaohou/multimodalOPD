main_process_port: 13378

compute_environment: LOCAL_MACHINE
debug: false
deepspeed_config:
  deepspeed_multinode_launcher: standard
  zero_stage: 2
  overlap_comm: true
  contiguous_gradients: true
  gradient_clip: 1
  # `auto` -> filled from TrainingArguments.gradient_accumulation_steps (single
  # source of truth). A hardcoded value here triple-specifies ga (config + the
  # `accelerate launch --gradient_accumulation_steps` flag + the script arg) and
  # inflates the effective batch (e.g. 512 -> 2048). Do NOT set a number here.
  gradient_accumulation_steps: auto
distributed_type: DEEPSPEED
downcast_bf16: 'auto'
machine_rank: 0
main_training_function: main
mixed_precision: bf16
num_machines: 1
num_processes: 8
rdzv_backend: static
same_network: true
tpu_env: []
tpu_use_cluster: false
tpu_use_sudo: false
use_cpu: false
