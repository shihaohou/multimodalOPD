main_process_port: 13378

compute_environment: LOCAL_MACHINE
debug: false
deepspeed_config:
  deepspeed_multinode_launcher: standard
  zero_stage: 2
  overlap_comm: true
  contiguous_gradients: true
  gradient_clip: 1
  # Keep this an INTEGER (accelerate's native deepspeed config int()s it at
  # Accelerator init — `auto` raises ValueError) and EQUAL to the launcher's
  # GRADIENT_ACCUMULATION_STEPS (default 8), which is also passed to the training
  # script's TrainingArguments. If the two disagree the effective batch is wrong.
  # Do NOT also pass `--gradient_accumulation_steps` to `accelerate launch`: that
  # compounded ga and inflated eff_batch 512 -> 2048. Change ga in BOTH places.
  gradient_accumulation_steps: 8
distributed_type: DEEPSPEED
downcast_bf16: 'auto'
machine_rank: 0
main_training_function: main
mixed_precision: bf16
num_machines: 1
num_processes: 8
rdzv_backend: static
same_network: true
tpu_env: []
tpu_use_cluster: false
tpu_use_sudo: false
use_cpu: false
